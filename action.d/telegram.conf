# Fail2Ban action for Telegram notifications
#
# This action sends ban/unban notifications to a Telegram chat.
# Requires: curl, telegram/notify.sh
#
# To use, add to your jail.local or jail.d/*.conf:
#
# [proxmox-backup-server]
# action = %(action_)s
#          telegram[telegram_action=/etc/fail2ban/telegram/notify.sh]

[INCLUDES]

before = common.conf

[Definition]

actionstart = %(telegram_action)s start "" "<name>"
actionstop  = %(telegram_action)s stop "" "<name>"
actionban   = %(telegram_action)s ban "<ip>" "<name>"
actionunban = %(telegram_action)s unban "<ip>" "<name>"

[Init]

telegram_action = /etc/fail2ban/telegram/notify.sh
