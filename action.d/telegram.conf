# Fail2Ban action for Telegram notifications
#
# This action sends ban/unban notifications to a Telegram chat.
# Requires: curl, telegram/notify.sh

[Definition]

actionstart = /etc/fail2ban/telegram/notify.sh start "" "<name>"
actionstop  = /etc/fail2ban/telegram/notify.sh stop "" "<name>"
actionban   = /etc/fail2ban/telegram/notify.sh ban "<ip>" "<name>"
actionunban = /etc/fail2ban/telegram/notify.sh unban "<ip>" "<name>"
